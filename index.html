<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #161616;
      --border:  #2a2a2a;
      --muted:   #555;
      --text:    #e8e4dc;
      --sub:     #888;
      --red:     #e05c3a;
      --green:   #5a9e6f;
      --amber:   #d4a843;
      --blue:    #4a8fb5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .app { width: 100%; max-width: 420px; position: relative; }

    /* Header */
    .header { margin-bottom: 2.5rem; }
    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem; letter-spacing: 0.12em;
      color: var(--text); line-height: 1; margin-bottom: 0.2rem;
    }
    .wordmark span { color: var(--red); }
    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
    }

    /* Setup */
    #setup { animation: fadeUp 0.6s ease both; }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin-bottom: 1rem;
    }
    .field {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.1rem 0.8rem;
      transition: border-color 0.2s;
    }
    .field:focus-within { border-color: var(--muted); }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .field input {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 0.08em; line-height: 1;
    }
    .field input[type="number"]::-webkit-inner-spin-button,
    .field input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="time"] { font-size: 2rem; color-scheme: dark; }
    .field input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.4); cursor: pointer;
    }

    /* End time preview */
    .endtime-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      padding: 0.7rem 1.1rem;
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .endtime-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      flex-shrink: 0;
    }
    .endtime-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.08em;
      color: var(--amber); line-height: 1;
    }
    .endtime-detail {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem; color: var(--muted);
      letter-spacing: 0.08em; margin-left: auto;
    }

    .submit-btn {
      width: 100%; padding: 1rem; background: var(--red);
      border: none; color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.2em;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover { background: #c94e2e; }
    .submit-btn:active { transform: scale(0.99); }
    .hint {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      color: var(--muted); letter-spacing: 0.1em;
      text-align: center; margin-top: 1rem;
    }

    /* Paste task list */
    .paste-area {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-top: none;
      padding: 0.7rem 0.9rem; resize: none;
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      letter-spacing: 0.06em; line-height: 1.7;
      color: var(--text); outline: none;
      transition: border-color 0.2s;
      min-height: 80px;
    }
    .paste-area::placeholder { color: var(--muted); }
    .paste-area:focus { border-color: var(--muted); }
    .paste-header {
      background: var(--surface); border: 1px solid var(--border);
      padding: 0.5rem 0.9rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .paste-header-label {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
    }
    .paste-count {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; color: var(--red);
    }

    /* Current pomodoro name display */
    .pom-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 10vw, 3.2rem);
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 0.15rem;
      min-height: 1.1em;
      transition: opacity 0.4s ease, color 0.5s;
      word-break: break-word;
    }
    .pom-title.waiting { color: var(--amber); opacity: 0.5; }
    .pom-title.focus   { color: var(--text);  opacity: 1; }
    .pom-title.rest    { color: var(--blue);  opacity: 0.75; }
    .pom-title.done    { color: var(--green); opacity: 1; }

    /* Editable name in schedule */
    .sched-name {
      flex: 1;
      background: transparent; border: none; outline: none;
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.05em; color: inherit;
      cursor: text; min-width: 0;
    }
    .sched-name:focus {{ color: var(--text); }}
    li.complete .sched-name { pointer-events: none; }

    /* Running */
    #running { display: none; animation: fadeUp 0.6s ease both; }
    .phase-label {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.5rem;
    }
    .big-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 22vw, 8rem);
      letter-spacing: 0.04em; line-height: 1;
      color: var(--text); margin-bottom: 0.3rem;
      transition: color 0.5s;
    }
    .big-time.waiting { color: var(--amber); }
    .big-time.focus   { color: var(--text); }
    .big-time.rest    { color: var(--blue); }
    .big-time.done    { color: var(--green); }

    .progress-wrap {
      height: 3px; background: var(--border);
      margin: 1.2rem 0; position: relative; display: flex;
    }
    .prog-focus {
      height: 100%; background: var(--red); width: 0%; flex-shrink: 0;
      transition: width 1s linear;
    }
    .prog-rest {
      height: 100%; background: var(--blue); width: 0%; flex-shrink: 0;
      transition: width 1s linear;
    }

    .pom-dots { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent;
      transition: all 0.4s ease;
    }
    .dot.waiting { border-color: var(--amber); }
    .dot.focus   { border-color: var(--red);   background: var(--red);   box-shadow: 0 0 8px rgba(224,92,58,0.5); }
    .dot.rest    { border-color: var(--blue);  background: var(--blue);  box-shadow: 0 0 8px rgba(74,143,181,0.4); }
    .dot.done    { border-color: var(--green); background: var(--green); }

    .status {
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      letter-spacing: 0.12em; color: var(--sub);
      min-height: 1.2rem; margin-bottom: 1.5rem;
    }

    .schedule-title {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem; margin-bottom: 0.8rem;
    }
    .schedule-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
    .schedule-list li {
      display: flex; align-items: center; gap: 0.7rem;
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.05em; color: var(--muted); transition: color 0.3s;
    }
    .schedule-list li.current-focus { color: var(--text); }
    .schedule-list li.current-rest  { color: var(--blue); }
    .schedule-list li.complete      { color: var(--border); text-decoration: line-through; }
    .sched-time { min-width: 45px; color: var(--sub); font-size: 0.63rem; }
    .sched-dot {
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid var(--border); flex-shrink: 0; transition: all 0.3s;
    }
    li.current-focus .sched-dot { background: var(--red);   border-color: var(--red); }
    li.current-rest  .sched-dot { background: var(--blue);  border-color: var(--blue); }
    li.complete      .sched-dot { background: var(--green); border-color: var(--green); }
    .sched-sub {
      font-size: 0.58rem; color: var(--muted);
      margin-left: auto; letter-spacing: 0.06em;
    }

    .done-banner {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
      letter-spacing: 0.15em; color: var(--green);
      margin-top: 1rem; opacity: 0; transition: opacity 1s ease;
    }
    .done-banner.show { opacity: 1; }
    .restart-btn {
      margin-top: 1.5rem; display: inline-block;
      padding: 0.6rem 1.8rem; border: 1px solid var(--border);
      background: transparent; color: var(--sub);
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      opacity: 0; pointer-events: none;
    }
    .restart-btn.show { opacity: 1; pointer-events: all; }
    .restart-btn:hover { border-color: var(--muted); color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SETUP -->
  <div id="setup">
    <div class="header">
      <div class="wordmark">POMO<span>DORO</span></div>
      <div class="tagline">Focus · Bell Timer</div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Start time</label>
        <input type="time" id="startTime">
      </div>
      <div class="field">
        <label>Pomodoros</label>
        <input type="number" id="pomCount" value="4" min="1" max="12">
      </div>
    </div>

    <!-- Dynamic end time preview -->
    <div class="endtime-preview">
      <span class="endtime-label">Ends at</span>
      <span class="endtime-value" id="endTimeValue">--:--</span>
      <span class="endtime-detail" id="endTimeDetail"></span>
    </div>

    <div id="pomNamesWrap" style="display:none;">
      <div class="paste-header">
        <span class="paste-header-label">Paste your task list · one per line</span>
        <span class="paste-count" id="pasteCount"></span>
      </div>
      <textarea class="paste-area" id="pasteList" placeholder="Email follow-ups&#10;Deep work: project proposal&#10;Review pull requests&#10;Team sync prep"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn">START SESSION</button>
    <div class="hint">25 min focus · single bell · 5 min rest · 3 bells</div>
  </div>

  <!-- RUNNING -->
  <div id="running">
    <div class="header">
      <div class="wordmark">POMO<span>DORO</span></div>
      <div class="tagline">Focus · Bell Timer</div>
    </div>
    <div class="pom-title waiting" id="pomTitle">&nbsp;</div>
    <div class="phase-label" id="phaseLabel">WAITING TO START</div>
    <div class="big-time waiting" id="bigTime">--:--</div>
    <div class="progress-wrap">
      <div class="prog-focus" id="progFocus"></div>
      <div class="prog-rest"  id="progRest"></div>
    </div>
    <div class="pom-dots" id="pomDots"></div>
    <div class="status" id="statusLine"></div>
    <div class="schedule-title">Session schedule</div>
    <ul class="schedule-list" id="scheduleList"></ul>
    <div class="done-banner" id="doneBanner">SESSION COMPLETE</div>
    <button class="restart-btn" id="restartBtn">↩ New session</button>
  </div>

</div>

let actx = null, buf3 = null, buf1 = null;

function b64ToAB(b64) {
  const bin = atob(b64), ab = new ArrayBuffer(bin.length), v = new Uint8Array(ab);
  for (let i = 0; i < bin.length; i++) v[i] = bin.charCodeAt(i);
  return ab;
}
async function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  [buf3, buf1] = await Promise.all([
    actx.decodeAudioData(b64ToAB(B64_3)),
    actx.decodeAudioData(b64ToAB(B64_1))
  ]);
}
function playBuf(buf, cb) {
  if (!actx || !buf) return;
  const s = actx.createBufferSource();
  s.buffer = buf; s.connect(actx.destination);
  if (cb) s.onended = cb;
  s.start(0);
}
function play3(cb) { playBuf(buf3, cb); }
function play1(cb) { playBuf(buf1, cb); }

// ── Helpers ───────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
const fmtCountdown = ms => {
  if (ms <= 0) return '0:00';
  const s = Math.ceil(ms / 1000);
  return Math.floor(s / 60) + ':' + pad(s % 60);
};
const fmtClock = d => pad(d.getHours()) + ':' + pad(d.getMinutes());

const FOCUS_MS = 25 * 60 * 1000;
const REST_MS  =  5 * 60 * 1000;
const CYCLE_MS = FOCUS_MS + REST_MS;

// ── Default start time: next :00 or :30 ──────────────────────────────────
function nextHalfHour() {
  const now = new Date();
  const m = now.getMinutes();
  const result = new Date(now);
  if (m < 30) {
    result.setMinutes(30, 0, 0);
  } else {
    result.setHours(result.getHours() + 1, 0, 0, 0);
  }
  return pad(result.getHours()) + ':' + pad(result.getMinutes());
}

document.getElementById('startTime').value = nextHalfHour();

// ── End time preview ──────────────────────────────────────────────────────
function updateEndTime() {
  const tv    = document.getElementById('startTime').value;
  const count = parseInt(document.getElementById('pomCount').value) || 0;
  const endVal    = document.getElementById('endTimeValue');
  const endDetail = document.getElementById('endTimeDetail');

  if (!tv || !count) { endVal.textContent = '--:--'; endDetail.textContent = ''; return; }

  const [hh, mm] = tv.split(':').map(Number);
  const now = new Date();
  const start = new Date(now);
  start.setHours(hh, mm, 0, 0);
  if (start <= now) start.setDate(start.getDate() + 1);

  const endDate = new Date(start.getTime() + count * CYCLE_MS);
  endVal.textContent = fmtClock(endDate);

  const totalMins = count * 30;
  endDetail.textContent = totalMins + ' min · ' + count + ' × 30 min';
}

// ── Pomodoro names (array, not DOM inputs) ────────────────────────────────
let pomNames = [];

function buildNameInputs() {
  const count = parseInt(document.getElementById('pomCount').value) || 0;
  const outer = document.getElementById('pomNamesWrap');
  outer.style.display = count < 1 ? 'none' : 'block';
  while (pomNames.length < count) pomNames.push('');
  pomNames = pomNames.slice(0, count);
}

function getPomName(i) {
  return (pomNames[i] && pomNames[i].trim()) ? pomNames[i].trim() : 'Pomodoro ' + (i + 1);
}

// ── Paste task list ───────────────────────────────────────────────────────
document.getElementById('pasteList').addEventListener('input', function () {
  const lines = this.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const pasteCount = document.getElementById('pasteCount');

  if (lines.length === 0) {
    pasteCount.textContent = '';
    pomNames = [];
    document.getElementById('pomCount').value = 4;
    updateEndTime();
    buildNameInputs();
    return;
  }

  const capped = Math.min(lines.length, 12);
  pasteCount.textContent = capped + ' task' + (capped !== 1 ? 's' : '');

  pomNames = lines.slice(0, 12);
  document.getElementById('pomCount').value = capped;
  updateEndTime();
  buildNameInputs();
});

document.getElementById('startTime').addEventListener('input', updateEndTime);
document.getElementById('pomCount').addEventListener('input', () => { updateEndTime(); buildNameInputs(); });
updateEndTime();
buildNameInputs();

// ── State ─────────────────────────────────────────────────────────────────
let tos = [], ticker = null;
const sched = (fn, d) => tos.push(setTimeout(fn, Math.max(0, d)));
function clearAll() { tos.forEach(clearTimeout); tos = []; clearInterval(ticker); ticker = null; }

const bigTime    = document.getElementById('bigTime');
const phaseLabel = document.getElementById('phaseLabel');
const pomTitle   = document.getElementById('pomTitle');
const statusLine = document.getElementById('statusLine');
const progFocus  = document.getElementById('progFocus');
const progRest   = document.getElementById('progRest');

// ── Submit ────────────────────────────────────────────────────────────────
document.getElementById('submitBtn').addEventListener('click', async () => {
  const tv    = document.getElementById('startTime').value;
  const count = parseInt(document.getElementById('pomCount').value);
  if (!tv || !count || count < 1) return;
  await initAudio();

  const [hh, mm] = tv.split(':').map(Number);
  const now = new Date();
  const start = new Date(now);
  start.setHours(hh, mm, 0, 0);
  if (start <= now) start.setDate(start.getDate() + 1);

  const waitMs = start - now;

  const blocks = [];
  for (let i = 0; i < count; i++) {
    const cycleStart = waitMs + i * CYCLE_MS;
    blocks.push({ pom: i, type: 'focus', startMs: cycleStart, startAt: new Date(now.getTime() + cycleStart) });
    blocks.push({ pom: i, type: 'rest',  startMs: cycleStart + FOCUS_MS, startAt: new Date(now.getTime() + cycleStart + FOCUS_MS) });
  }

  document.getElementById('setup').style.display   = 'none';
  document.getElementById('running').style.display = 'block';
  buildDots(count);

  // Collect names before setup is hidden
  const names = [];
  for (let i = 0; i < count; i++) names.push(getPomName(i));

  buildSchedule(blocks, names);

  phaseLabel.textContent = 'STARTING AT ' + fmtClock(start);
  statusLine.textContent = 'Session begins in…';
  bigTime.className  = 'big-time waiting';
  pomTitle.className = 'pom-title waiting';
  pomTitle.textContent = names[0] || 'Pomodoro 1';
  document.title = '⏳ Starting soon — Pomodoro';
  resetProgress();

  for (let i = 0; i < count; i++) {
    const focusStart = waitMs + i * CYCLE_MS;
    const restStart  = focusStart + FOCUS_MS;
    const cycleEnd   = focusStart + CYCLE_MS;
    const isLast     = i === count - 1;

    sched(() => {
      play3(() => {
        const name = names[i] || ('Pomodoro ' + (i + 1));
        phaseLabel.textContent = name.toUpperCase() + ' · FOCUS';
        pomTitle.className = 'pom-title focus';
        pomTitle.textContent = name;
        document.title = '🔴 ' + name + ' · Focus';
        bigTime.className = 'big-time focus';
        statusLine.textContent = 'Focus · 25 minutes';
        setDot(i, 'focus');
        setSchedState('focus-' + i, 'current-focus');
      });
    }, focusStart);

    sched(() => {
      play1(() => {
        const name = names[i] || ('Pomodoro ' + (i + 1));
        phaseLabel.textContent = name.toUpperCase() + ' · REST';
        pomTitle.className = 'pom-title rest';
        pomTitle.textContent = name;
        document.title = '🔵 ' + name + ' · Rest';
        bigTime.className = 'big-time rest';
        statusLine.textContent = 'Rest · 5 minutes';
        setDot(i, 'rest');
        setSchedState('focus-' + i, 'complete');
        setSchedState('rest-' + i,  'current-rest');
      });
    }, restStart);

    sched(() => {
      setDot(i, 'done');
      setSchedState('rest-' + i, 'complete');
      if (isLast) {
        play3(() => {
          phaseLabel.textContent = 'SESSION COMPLETE';
          pomTitle.className = 'pom-title done';
          pomTitle.textContent = 'Done';
          document.title = '✅ Session Complete — Pomodoro';
          bigTime.textContent = '0:00';
          bigTime.className = 'big-time done';
          resetProgress('done');
          statusLine.textContent = 'Well done.';
          clearInterval(ticker);
          document.getElementById('doneBanner').classList.add('show');
          document.getElementById('restartBtn').classList.add('show');
        });
      } else {
        const nextName = names[i + 1] || ('Pomodoro ' + (i + 2));
        phaseLabel.textContent = 'NEXT POMODORO STARTING…';
        pomTitle.className = 'pom-title waiting';
        pomTitle.textContent = nextName;
        document.title = '⏳ ' + nextName + ' starting…';
        bigTime.className = 'big-time waiting';
        statusLine.textContent = nextName + ' beginning…';
      }
    }, cycleEnd);
  }

  ticker = setInterval(() => {
    const elapsed = Date.now() - start.getTime();
    if (elapsed < 0) {
      bigTime.textContent = fmtCountdown(-elapsed);
      resetProgress();
      return;
    }
    const cycleIdx = Math.floor(elapsed / CYCLE_MS);
    if (cycleIdx >= count) return;
    const cycleElapsed = elapsed % CYCLE_MS;
    if (cycleElapsed < FOCUS_MS) {
      bigTime.textContent = fmtCountdown(FOCUS_MS - cycleElapsed);
      progFocus.style.width = (cycleElapsed / FOCUS_MS * 25 / 30) + '%';
      progRest.style.width  = '0%';
    } else {
      const restElapsed = cycleElapsed - FOCUS_MS;
      bigTime.textContent = fmtCountdown(REST_MS - restElapsed);
      progFocus.style.width = (25 / 30 * 100) + '%';
      progRest.style.width  = (restElapsed / REST_MS * 5 / 30) + '%';
    }
  }, 500);
});

function resetProgress(state) {
  if (state === 'done') {
    progFocus.style.width = (25/30*100) + '%';
    progRest.style.width  = (5/30*100)  + '%';
  } else {
    progFocus.style.width = '0%';
    progRest.style.width  = '0%';
  }
}

function buildDots(count) {
  const wrap = document.getElementById('pomDots');
  wrap.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = 'dot-' + i;
    wrap.appendChild(d);
  }
}
function setDot(i, s) {
  const d = document.getElementById('dot-' + i);
  if (d) d.className = 'dot ' + s;
}

function buildSchedule(blocks, names) {
  const ul = document.getElementById('scheduleList');
  ul.innerHTML = '';
  blocks.forEach(b => {
    const li = document.createElement('li');
    li.id = 'sched-' + b.type + '-' + b.pom;
    const sub  = b.type === 'focus' ? '25 min' : '5 min rest';
    const name = names[b.pom] || ('Pomodoro ' + (b.pom + 1));
    const displayName = b.type === 'rest' ? name + ' · Rest' : name;
    li.innerHTML =
      '<span class="sched-time">' + fmtClock(b.startAt) + '</span>' +
      '<div class="sched-dot"></div>' +
      '<input class="sched-name" data-pom="' + b.pom + '" data-type="' + b.type + '" ' +
        'value="' + displayName.replace(/"/g, '&quot;') + '" ' +
        'placeholder="' + displayName.replace(/"/g, '&quot;') + '">' +
      '<span class="sched-sub">' + sub + '</span>';
    ul.appendChild(li);
  });

  // Sync name edits across focus/rest rows for same pom
  ul.addEventListener('input', e => {
    const inp = e.target.closest('.sched-name');
    if (!inp || inp.dataset.type !== 'focus') return;
    const pomIdx = inp.dataset.pom;
    const restRow = document.querySelector('.sched-name[data-pom="' + pomIdx + '"][data-type="rest"]');
    if (restRow) {
      const base = inp.value.trim() || ('Pomodoro ' + (parseInt(pomIdx) + 1));
      restRow.value = base + ' · Rest';
    }
  });
}
function setSchedState(id, state) {
  const el = document.getElementById('sched-' + id);
  if (el) el.className = state;
}

document.getElementById('restartBtn').addEventListener('click', () => {
  clearAll();
  pomNames = [];
  document.title = 'Pomodoro';
  document.getElementById('running').style.display = 'none';
  document.getElementById('setup').style.display   = 'block';
  document.getElementById('doneBanner').classList.remove('show');
  document.getElementById('restartBtn').classList.remove('show');
  document.getElementById('startTime').value = nextHalfHour();
  document.getElementById('pasteList').value = '';
  document.getElementById('pasteCount').textContent = '';
  updateEndTime();
  buildNameInputs();
});
</script>
</body>
</html>
